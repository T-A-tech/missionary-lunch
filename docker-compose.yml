services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: almocos
      POSTGRES_PASSWORD: almocos
      POSTGRES_DB: almocos_development
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almocos"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://almocos:almocos@db:5432/almocos_development
      RAILS_ENV: development
      SECRET_KEY_BASE: dev_secret_key_base_change_in_production

volumes:
  pgdata:
  bundle_cache:
