# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

inherit_mode:
  merge:
    - Exclude

AllCops:
  Exclude:
    - "db/schema.rb"

# Omakase uses [ ] with spaces, but Rails generators use [] without.
# Disabling to avoid conflicts with auto-generated code.
Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false

Layout/SpaceAfterComma:
  Exclude:
    - "db/**/*"
