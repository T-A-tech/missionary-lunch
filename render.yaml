services:
  - type: web
    name: missionary-lunch
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
    buildFilter:
      paths:
        - "**/*"
